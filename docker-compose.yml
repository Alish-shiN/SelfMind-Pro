services:
  redis:
    image: redis:7-alpine
    container_name: selfmind_redis
    ports:
      - "6379:6379"
    volumes:
      - selfmind_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selfmind_api
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  selfmind_redis: